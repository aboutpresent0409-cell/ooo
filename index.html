<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💖 给宝的专属扭蛋机 💖</title>
    <style>
        body {
            background-color: #ffe6e6;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            color: #ff4d6d;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* 扭蛋机外壳 */
        .machine-container {
            width: 280px;
            height: 400px;
            background: linear-gradient(145deg, #ff758f, #ff4d6d);
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 扭蛋玻璃罩 */
        .glass-ball {
            width: 240px;
            height: 200px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            border: 4px solid #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 10px;
        }

        /* 小扭蛋 */
        .capsule {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(to bottom, #ffb3c1 50%, #fff 50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* 摇晃动画 */
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-5px, 5px) rotate(-5deg); }
            40% { transform: translate(5px, -5px) rotate(5deg); }
            60% { transform: translate(-5px, -5px) rotate(-3deg); }
            80% { transform: translate(5px, 5px) rotate(3deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .shaking .capsule {
            animation: shake 0.1s infinite;
        }

        /* 旋转按钮 */
        .crank {
            width: 70px;
            height: 70px;
            background: #fff;
            border-radius: 50%;
            margin-top: 30px;
            border: 5px solid #ff758f;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .crank:active {
            transform: rotate(360deg);
        }

        /* 出蛋口 */
        .exit {
            width: 80px;
            height: 50px;
            background: #4a4a4a;
            border-radius: 10px 10px 0 0;
            position: absolute;
            bottom: 0;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 80%;
            animation: popUp 0.3s ease-out;
        }

        @keyframes popUp {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal-content h2 {
            color: #ff4d6d;
            margin-top: 0;
        }

        .close-btn {
            margin-top: 20px;
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>✨ 扭蛋机 ✨</h1>

    <div class="machine-container">
        <div class="glass-ball" id="glassBall">
            <div class="capsule" style="background: linear-gradient(to bottom, #ff007f 50%, #fff 50%);"></div>
            <div class="capsule" style="background: linear-gradient(to bottom, #ffb3c1 50%, #fff 50%);"></div>
            <div class="capsule" style="background: linear-gradient(to bottom, #70d6ff 50%, #fff 50%);"></div>
            <div class="capsule" style="background: linear-gradient(to bottom, #ffd166 50%, #fff 50%);"></div>
            <div class="capsule" style="background: linear-gradient(to bottom, #06d6a0 50%, #fff 50%);"></div>
            <div class="capsule" style="background: linear-gradient(to bottom, #ccff33 50%, #fff 50%);"></div>
        </div>

        <div class="crank" id="crankBtn">💫</div>

        <div class="exit"></div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h2>🎉 恭喜你抽中！🎉</h2>
            <p id="prizeText" style="font-size: 20px; font-weight: bold; color: #333; margin: 20px 0;"></p>
            <button class="close-btn" onclick="closeModal()">收下奖励</button>
        </div>
    </div>

    <script>
        // 🎁 在这里修改你的专属奖品池！
        const prizes = [
            "😘 present的亲亲",
            "🐶喊的嘴瓢面包变成了面飙，纠缠随机应变依然找对。",
            "🛒 我想不到了",
            "💆 嗯嗯啊啊",
            "🎬 去看电影",
            "💖 允许生气但立刻被哄好券",
            "🍦 买单券"
        ];

        const crankBtn = document.getElementById('crankBtn');
        const glassBall = document.getElementById('glassBall');
        const resultModal = document.getElementById('resultModal');
        const prizeText = document.getElementById('prizeText');
        
        let isSpinning = false;

        crankBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            // 按钮旋转效果
            crankBtn.style.transform = 'rotate(360deg)';
            // 扭蛋摇晃效果
            glassBall.classList.add('shaking');

            // 模拟扭蛋中...2秒后出结果
            setTimeout(() => {
                // 恢复状态
                glassBall.classList.remove('shaking');
                crankBtn.style.transform = 'rotate(0deg)';
                
                // 随机抽取奖品
                const randomIndex = Math.floor(Math.random() * prizes.length);
                prizeText.innerText = prizes[randomIndex];
                
                // 显示弹窗
                resultModal.style.display = 'flex';
            }, 2000);
        });

        function closeModal() {
            resultModal.style.display = 'none';
            isSpinning = false;
        }
    </script>
</body>
</html>
